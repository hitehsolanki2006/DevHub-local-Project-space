name: Build and Release Windows Executable

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Set up MSVC Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile C Scanner DLL
        run: |
          cl.exe /LD /O2 src/c_core/scanner.c /Fe:src/scanner.dll

      - name: Build Executable with PyInstaller
        run: |
          pyinstaller --noconsole --onefile --add-data "src/scanner.dll;core" --name "DevHub" src/main.py

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevHub-Windows-Build
          path: dist/DevHub.exe
